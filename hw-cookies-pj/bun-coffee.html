<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wake Up, Bun!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap"
      rel="stylesheet">
    <link href="bun-styles.css" rel="stylesheet">
    <script src="bun-func.js" defer></script>
    <script src="https://unpkg.com/lucide@latest" defer></script> 

</head>
<body>
  
<div id="game">
      <canvas id="stars-canvas"></canvas>
      <div id="flash"></div>
      <div id="toast-area"></div>

        <!-- ===== BUN ลอยขึ้นบนฟ้าตอน Win &
         ========= หน้า reset game =========-->

      <div id="win-overlay">
        <div id="win-title">Bun reached space!</div>
        <div id="win-sub">
          10,000 java beans brewed.<br />A legendary barista.
        </div>
        <div id="win-stats"</div>
        <button id="win-btn" onclick="resetGame()">Brew Again</button>
      </div>

       <!-- ===== ส่วน LOGO + nav menu ==
         ===========================-->

      <div id="header">
        <div id="game-title">Wake Up, Bun!</div>
        <div id="idle-pill">
          <i data-lucide="ev-charger"></i>
          <span id="idle-disp">0.1/s</span>
        </div>
      </div>

      <div id="game-layout">
        <div id="clicker-section">
          <div id="counter-area">
            <div id="lbl">java beans</div>
            <div id="hcount">0</div>
            <div id="combo-badge">x<span id="combo-num">1</span> combo</div>
          </div>
          <div id="stage-label">sleepy bun · stage 1</div>

          <!--=== Progress Circle===-->
          <div id="ring-wrap" onclick="clickBun(event)">
            <svg
              id="ring-svg"
              viewBox="0 0 240 240"
             xmlns="http://www.w3.org/2000/svg">
              <!--โครงร่างวงกลม สร้างเป็นร่างไว้ค่อยให้ fill มาเติม-->
              <circle
                cx="120"
                cy="120"
                r="108"
                fill="none"
                stroke="rgba(188,113,20,0.10)"
                stroke-width="6"
                stroke-linecap="round">
              <g id="ring-segs"></g>

              <!--ส่่วนที่จะมา fill สร้างและซ่อนไว้รอ JS ลดค่าเป็น 0 ให้เต็มรอบวง 100% 
              คำนวน dashoff จากสูตรความยาวรอบวงกลม 2TTr เริ่มจาก 12 นาฬิกาที่ -90-->
              <circle
                id="ring-fill"
                cx="120"
                cy="120"
                r="108"
                fill="none"
                stroke="rgba(188,113,20,0.75)"
                stroke-width="5"
                stroke-linecap="round"
                stroke-dasharray="678.6"
                stroke-dashoffset="678.6"
                transform="rotate(-90 120 120)"
                style="transition: stroke-dashoffset 0.35s ease"
              />

               <!--สร้าง head ของเส้นที่เป็น dot -->
              <circle
                id="ring-dot"
                cx="120"
                cy="12"
                r="4.5"
                fill="var(--brown)"
                opacity="0"
                style="transition: opacity 0.3s">
            </svg>

             <!-- รูป bun เริ่มต้น -->
            <img
              id="bun-img"
              src="bun-1.png"
              alt="Bun the coffee dog">
          </div>
          <div id="tap-hint">tap to brew</div>
        </div>

        <div id="management-section">
          <div id="upg-row">
            <!-- กล่อง upgrade 1 -->
            <div class="uc locked" id="uc0" onclick="buy(0)">
              <div class="uc-lv" id="ul0">lv 0</div>
              <div class="uc-icon"><i data-lucide="coffee"></i></div>
              <div class="uc-name">Espresso Shot</div>
              <div class="uc-cost" id="uc0c">30 jb</div>
              <div class="uc-desc" id="ud0">+click power</div>
            </div>
             <!-- กล่อง upgrade 2 -->
            <div class="uc locked" id="uc1" onclick="buy(1)">
              <div class="uc-lv" id="ul1">lv 0</div>
              <div class="uc-icon"><i data-lucide="droplet"></i></div>
              <div class="uc-name">Drip Machine</div>
              <div class="uc-cost" id="uc1c">80 jb</div>
              <div class="uc-desc" id="ud1">+idle income</div>
            </div>
             <!-- กล่อง upgrade 3 -->
            <div class="uc locked" id="uc2" onclick="buy(2)">
              <div class="uc-lv" id="ul2">lv 0</div>
              <div class="uc-icon"><i data-lucide="bean"></i></div>
              <div class="uc-name">Extraterritorial Bean</div>
              <div class="uc-cost" id="uc2c">200 jb</div>
              <div class="uc-desc" id="ud2">+both</div>
            </div>
          </div>

          <div id="ms-strip">
            <div id="ms-strip-title">milestones</div>
          </div>
        </div>
      </div>
    </div>

</body>
</html>
